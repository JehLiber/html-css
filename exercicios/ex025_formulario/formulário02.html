<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Teste de Formulário</h1>
    <form action="cadastro.php" method="post" autocomplete="on">
        <p>
            <label for="iusuario">Usuário:</label>
            <input type="text" name="usuario" id="iusuario" required minlength="3" maxlength="15" size="12" placeholder="nome do usuário" autocomplete="username"> <!-- required = faz com que o usuário seja obrigado a preencher o campo antes de enviar--> <!-- autocomplete, faz com que tudo que ta registrado no seu navegador, relembre que dos seus dados, para facilitar na hora de escrever.-->
        </p>
        <p>
            <label for="isenha">Senha:</label>
            <input type="password" name="senha" id="isenha" required minlength="8" maxlength="15" size="12" placeholder="digite sua senha" autocomplete="current-password"> <!-- min ou maxlength = ele diz o máximo de caracteres que o usuário pode digitar -->
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
