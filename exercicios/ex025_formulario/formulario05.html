<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <h1>Checkbox e Radio Button</h1>
    <!--você pode colocar um deles tbm, um atributo de "checked" ao lado para já aparecer marcado, isso pode fazer com a checkbox tbm, o checked serve para formulário quando geralmente recebe anuncio no email automaticamente. -->
    <form action="cadastro.php" method="get">
        <fieldset>
            <legend>Sexo</legend>
            <!--o name="sexo" precisa ser o mesmo para ambos, pois é só um que vai precisar clicar para identificar o sexo da pessoa, -->
            <input type="radio" name="sexo" id="isxmas"><label for="isxmas">Masculino</label>
            <input type="radio" name="sexo" id="isxfem"><label for="isxfem">Feminino</label>
        </fieldset>
        <fieldset>
            <legend>Esportes favoritos</legend>
            <input type="checkbox" name="esfut" id="iesfut"><label for="iesfut">Futebol</label> <br>
            <input type="checkbox" name="esbas" id="iesbas"><label for="iesbas">Basquete</label> <br>
            <input type="checkbox" name="esnat" id="iesnat"><label for="iesnat">Natação</label> <br>
            <input type="checkbox" name="esten" id="iesten"><label for="iesten">Tênis</label> <br>
        </fieldset>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
