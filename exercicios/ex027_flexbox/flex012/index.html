<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box</title>
    <style>
        div.conteiner {
            background-color: rgb(196, 113, 230);

            display: flex;
            flex-flow: row nowrap;
            
        }
        div.item{
            background-color: rgb(228, 34, 34);
            border: 1px solid black;
            text-align: center;
            flex:1;
        }
        /*
        shorthand
        flex-grow + flex-shrink + flex-basis
        */
        div#cxA{
        /*  flex-shrink: 0;
            flex-grow: 1;
            flex-basis: 200px; */
        
            flex: 1 0 200px;
        }     
        div#cxB{
           /* flex-shrink: 1;
            flex-grow: 1;
            flex-basis: 200px; */

            flex: 1 1 200px;
        }
        div#cxC{
             /*flex-shrink: 8;
            flex-grow: 1;
            flex-basis: 200px; */

            flex: 1 8 200px;
        }


    </style>
</head>
<body>
    <div class="conteiner">
        <div class="item" id="cxA">A</div>
        <div class="item" id="cxB">B</div>
        <div class="item" id="cxC">C</div>
    </div>
</body>
</html>
